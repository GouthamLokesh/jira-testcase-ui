<!DOCTYPE html>
<html>
<head>
<title>AI Jira Test Case Generator</title>

<style>

:root{
--bg:#0f172a;
--card:#1e293b;
--text:white;
--table:#020617;
--border:#334155;
}

.light-mode{
--bg:#f1f5f9;
--card:white;
--text:#020617;
--table:#e2e8f0;
--border:#cbd5f5;
}

body{
font-family: Arial, sans-serif;
background:var(--bg);
color:var(--text);
margin:0;
padding:40px;
transition:0.3s;
}

.container{
max-width:1000px;
margin:auto;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

h1{
margin:0;
}

.theme-btn{
background:#38bdf8;
border:none;
padding:10px 16px;
border-radius:6px;
cursor:pointer;
}

.search-box{
display:flex;
gap:10px;
margin-bottom:20px;
}

input{
flex:1;
padding:12px;
border-radius:6px;
border:none;
font-size:16px;
}

button{
padding:12px 20px;
background:#38bdf8;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
background:var(--card);
}

th,td{
padding:12px;
border-bottom:1px solid var(--border);
text-align:left;
}

th{
background:var(--table);
}

.steps{
margin-top:10px;
background:var(--table);
padding:10px;
border-radius:6px;
display:none;
}

.loading{
margin-top:15px;
font-style:italic;
}

.export{
margin-top:20px;
display:flex;
gap:10px;
}

</style>
</head>

<body>

<div class="container">

<div class="topbar">
<h1>AI Jira Test Case Generator</h1>
<button class="theme-btn" onclick="toggleTheme()">Toggle Theme</button>
</div>

<div class="search-box">
<input id="jiraKey" placeholder="Enter Jira Issue Key (Example: QA-1)">
<button onclick="generate()">Generate</button>
</div>

<div class="loading" id="loading"></div>

<div class="export">
<button onclick="exportCSV()">Export to Excel</button>
<button onclick="copyAll()">Copy Test Cases</button>
</div>

<div id="result"></div>

</div>

<script>

let globalData=null

/* THEME HANDLING */

function toggleTheme(){

document.body.classList.toggle("light-mode")

localStorage.setItem(
"theme",
document.body.classList.contains("light-mode")?"light":"dark"
)

}

window.onload=function(){

const savedTheme=localStorage.getItem("theme")

if(savedTheme==="light"){
document.body.classList.add("light-mode")
}

}

/* API CALL */

async function generate(){

const key=document.getElementById("jiraKey").value
const loading=document.getElementById("loading")
const result=document.getElementById("result")

result.innerHTML=""
loading.innerHTML="Generating test cases..."

try{

const response=await fetch(
"https://n8n-public-epns.onrender.com/webhook/Jira-Test-Case-Generator",
{
method:"POST",
headers:{
"Content-Type":"application/json",
"x-path-api":"Goutham@12"
},
body:JSON.stringify({issueKey:key})
})

const data=await response.json()

globalData=data

loading.innerHTML=""

renderTable(data)

}catch(e){

loading.innerHTML=""
result.innerHTML="<p style='color:red'>Error loading test cases</p>"

}

}

/* TABLE RENDER */

function renderTable(data){

let html=""

html+=`<h2>Positive Test Cases</h2>`
html+=tableHTML(data.positive_tests)

html+=`<h2 style="margin-top:40px">Negative Test Cases</h2>`
html+=tableHTML(data.negative_tests)

document.getElementById("result").innerHTML=html

}

function tableHTML(tests){

let rows=""

tests.forEach((tc,i)=>{

rows+=`

<tr>
<td>${tc.test_case_id}</td>
<td>${tc.preconditions}</td>
<td>
<button onclick="toggleSteps('steps${i}')">View Steps</button>

<div class="steps" id="steps${i}">
<ul>
${tc.steps.map(s=>`<li>${s}</li>`).join("")}
</ul>
<b>Expected:</b> ${tc.expected_result}
</div>

</td>
</tr>

`

})

return`

<table>

<tr>
<th>ID</th>
<th>Preconditions</th>
<th>Steps</th>
</tr>

${rows}

</table>

`

}

/* STEP TOGGLE */

function toggleSteps(id){

const el=document.getElementById(id)

if(el.style.display==="block"){
el.style.display="none"
}else{
el.style.display="block"
}

}

/* COPY */

function copyAll(){

navigator.clipboard.writeText(JSON.stringify(globalData,null,2))

alert("Copied test cases")

}

/* EXPORT */

function exportCSV(){

if(!globalData) return

let csv="TestCaseID,Preconditions,Steps,Expected Result\n"

function addRows(arr){

arr.forEach(tc=>{
csv+=`${tc.test_case_id},"${tc.preconditions}","${tc.steps.join(" | ")}","${tc.expected_result}"\n`
})

}

addRows(globalData.positive_tests)
addRows(globalData.negative_tests)

const blob=new Blob([csv])
const url=window.URL.createObjectURL(blob)

const a=document.createElement("a")
a.href=url
a.download="testcases.csv"
a.click()

}

</script>

</body>
</html>

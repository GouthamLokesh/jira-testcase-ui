<!DOCTYPE html>
<html>
<head>
<title>AI Jira Test Case Generator</title>

<style>

body{
font-family: Arial, sans-serif;
background:#0f172a;
color:white;
margin:0;
padding:40px;
}

.container{
max-width:1000px;
margin:auto;
}

h1{
text-align:center;
margin-bottom:30px;
}

.search-box{
display:flex;
gap:10px;
margin-bottom:20px;
}

input{
flex:1;
padding:12px;
border-radius:6px;
border:none;
font-size:16px;
}

button{
padding:12px 20px;
background:#38bdf8;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#0ea5e9;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
background:#1e293b;
}

th,td{
padding:12px;
border-bottom:1px solid #334155;
text-align:left;
}

th{
background:#020617;
}

.steps{
margin-top:10px;
background:#020617;
padding:10px;
border-radius:6px;
display:none;
}

.export{
margin-top:20px;
}

.loading{
margin-top:15px;
font-style:italic;
}

</style>
</head>

<body>

<div class="container">

<h1>AI Jira Test Case Generator</h1>

<div class="search-box">
<input id="jiraKey" placeholder="Enter Jira Issue Key (Example: QA-1)">
<button onclick="generate()">Generate</button>
</div>

<div class="loading" id="loading"></div>

<div class="export">
<button onclick="exportCSV()">Export to Excel</button>
<button onclick="copyAll()">Copy Test Cases</button>
</div>

<div id="result"></div>

</div>

<script>

let globalData=null

async function generate(){

const key=document.getElementById("jiraKey").value
const loading=document.getElementById("loading")
const result=document.getElementById("result")

result.innerHTML=""
loading.innerHTML="Generating test cases..."

try{

const response=await fetch(
"https://n8n-public-epns.onrender.com/webhook/Jira-Test-Case-Generator",
{
method:"POST",
headers:{
"Content-Type":"application/json",
"x-path-api":"Goutham@12"
},
body:JSON.stringify({issueKey:key})
})

const data=await response.json()

globalData=data

loading.innerHTML=""

renderTable(data)

}catch(e){

loading.innerHTML=""
result.innerHTML="<p style='color:red'>Error loading test cases</p>"

}

}

function renderTable(data){

let html=""

html+=`<h2>Positive Test Cases</h2>`

html+=tableHTML(data.positive_tests)

html+=`<h2 style="margin-top:40px">Negative Test Cases</h2>`

html+=tableHTML(data.negative_tests)

document.getElementById("result").innerHTML=html

}

function tableHTML(tests){

let rows=""

tests.forEach((tc,i)=>{

rows+=`

<tr>
<td>${tc.test_case_id}</td>
<td>${tc.preconditions}</td>
<td>
<button onclick="toggleSteps('steps${i}')">View Steps</button>
<div class="steps" id="steps${i}">
<ul>
${tc.steps.map(s=>`<li>${s}</li>`).join("")}
</ul>
<b>Expected:</b> ${tc.expected_result}
</div>
</td>
</tr>

`

})

return`

<table>

<tr>
<th>Test Case ID</th>
<th>Preconditions</th>
<th>Steps</th>
</tr>

${rows}

</table>

`

}

function toggleSteps(id){

const el=document.getElementById(id)

if(el.style.display==="block"){
el.style.display="none"
}else{
el.style.display="block"
}

}

function copyAll(){

navigator.clipboard.writeText(JSON.stringify(globalData,null,2))

alert("Copied test cases")

}

function exportCSV(){

if(!globalData) return

let csv="TestCaseID,Preconditions,Steps,Expected Result\n"

function addRows(arr){

arr.forEach(tc=>{
csv+=`${tc.test_case_id},"${tc.preconditions}","${tc.steps.join(" | ")}","${tc.expected_result}"\n`
})

}

addRows(globalData.positive_tests)
addRows(globalData.negative_tests)

const blob=new Blob([csv])
const url=window.URL.createObjectURL(blob)

const a=document.createElement("a")
a.href=url
a.download="testcases.csv"
a.click()

}

</script>

</body>
</html>

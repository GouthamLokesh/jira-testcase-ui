<!DOCTYPE html>
<html>
<head>
<title>AI Jira Test Case Generator</title>

<style>

:root{
--bg:#0f172a;
--card:#1e293b;
--text:white;
--border:#334155;
--tableHeader:#020617;
--btn:#38bdf8;
}

.light-mode{
--bg:#f1f5f9;
--card:white;
--text:#020617;
--border:#cbd5e1;
--tableHeader:#e2e8f0;
}

body{
font-family: Arial, sans-serif;
background:var(--bg);
color:var(--text);
margin:0;
padding:40px;
transition:0.3s;
}

.container{
max-width:1100px;
margin:auto;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

h1{
margin:0;
}

button{
padding:10px 16px;
border:none;
border-radius:6px;
background:var(--btn);
cursor:pointer;
font-weight:bold;
}

button:hover{
opacity:0.9;
}

.search-box{
display:flex;
gap:10px;
margin-bottom:20px;
}

input{
flex:1;
padding:12px;
border-radius:6px;
border:none;
font-size:16px;
}

.actions{
display:flex;
gap:10px;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
background:var(--card);
border-radius:6px;
overflow:hidden;
}

th,td{
padding:12px;
border-bottom:1px solid var(--border);
text-align:left;
}

th{
background:var(--tableHeader);
}

.priority-high{
color:#ef4444;
font-weight:bold;
}

.priority-medium{
color:#f59e0b;
font-weight:bold;
}

.priority-low{
color:#22c55e;
font-weight:bold;
}

.status{
font-weight:bold;
}

.status-untested{
color:#94a3b8;
}

.status-pass{
color:#22c55e;
}

.status-fail{
color:#ef4444;
}

.steps{
background:#020617;
padding:12px;
margin-top:10px;
border-radius:6px;
display:none;
}

.loading{
margin-top:15px;
font-style:italic;
}

.section{
margin-top:30px;
}

</style>

</head>

<body>

<div class="container">

<div class="topbar">
<h1>AI Jira Test Case Generator</h1>
<button onclick="toggleTheme()">Toggle Theme</button>
</div>

<div class="search-box">
<input id="jiraKey" placeholder="Enter Jira Issue Key (Example: QA-1)">
<button onclick="generate()">Generate</button>
</div>

<div class="actions">
<button onclick="exportCSV()">Export to Excel</button>
<button onclick="copyAll()">Copy Test Cases</button>
</div>

<div id="loading" class="loading"></div>

<div id="result"></div>

</div>

<script>

let globalData=null

function toggleTheme(){
document.body.classList.toggle("light-mode")
}

async function generate(){

const key=document.getElementById("jiraKey").value
const loading=document.getElementById("loading")
const result=document.getElementById("result")

loading.innerHTML="Generating AI test cases..."
result.innerHTML=""

try{

const response=await fetch(
"https://n8n-public-epns.onrender.com/webhook/Jira-Test-Case-Generator",
{
method:"POST",
headers:{
"Content-Type":"application/json",
"x-path-api":"Goutham@12"
},
body:JSON.stringify({issueKey:key})
})

const data=await response.json()

globalData=data

loading.innerHTML=""

renderTable(data)

}catch(e){

loading.innerHTML=""
result.innerHTML="<p style='color:red'>Error loading test cases</p>"

}

}

function renderTable(data){

let html=""

html+=`<div class="section"><h2>Positive Test Cases</h2>`
html+=tableHTML(data.positive_tests)
html+=`</div>`

html+=`<div class="section"><h2>Negative Test Cases</h2>`
html+=tableHTML(data.negative_tests)
html+=`</div>`

document.getElementById("result").innerHTML=html

}

function tableHTML(tests){

let rows=""

tests.forEach((tc,i)=>{

let priority="Medium"

rows+=`

<tr>
<td>${tc.test_case_id}</td>
<td>${tc.preconditions}</td>
<td class="priority-medium">${priority}</td>
<td class="status status-untested">Untested</td>
<td>

<button onclick="toggleSteps('steps${i}')">Steps</button>

<div class="steps" id="steps${i}">
<ul>
${tc.steps.map(s=>`<li>${s}</li>`).join("")}
</ul>

<b>Expected Result:</b>
<p>${tc.expected_result}</p>

</div>

</td>
</tr>

`

})

return`

<table>

<tr>
<th>ID</th>
<th>Preconditions</th>
<th>Priority</th>
<th>Status</th>
<th>Steps</th>
</tr>

${rows}

</table>

`

}

function toggleSteps(id){

const el=document.getElementById(id)

if(el.style.display==="block"){
el.style.display="none"
}else{
el.style.display="block"
}

}

function copyAll(){

navigator.clipboard.writeText(JSON.stringify(globalData,null,2))

alert("Test cases copied")

}

function exportCSV(){

if(!globalData) return

let csv="TestCaseID,Preconditions,Priority,Status,Steps,Expected Result\n"

function addRows(arr){

arr.forEach(tc=>{
csv+=`${tc.test_case_id},"${tc.preconditions}",Medium,Untested,"${tc.steps.join(" | ")}","${tc.expected_result}"\n`
})

}

addRows(globalData.positive_tests)
addRows(globalData.negative_tests)

const blob=new Blob([csv])
const url=window.URL.createObjectURL(blob)

const a=document.createElement("a")
a.href=url
a.download="testcases.csv"
a.click()

}

</script>

</body>
</html>

<!DOCTYPE html>
<html>

<head>

<title>AI Jira Test Case Generator</title>

<style>

body{
font-family: Arial;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:#1e293b;
padding:40px;
border-radius:10px;
width:600px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:5px;
border:none;
}

button{
margin-top:15px;
padding:12px;
width:100%;
background:#38bdf8;
border:none;
border-radius:5px;
cursor:pointer;
font-weight:bold;
}

.card{
background:#020617;
padding:15px;
margin-top:15px;
border-radius:8px;
}

</style>

</head>

<body>

<div class="container">

<h2>AI Jira Test Case Generator</h2>

<input id="jiraKey" placeholder="Enter Jira Issue Key (Example: PROJ-123)">

<button onclick="generate()">Generate Test Cases</button>

<div id="loading"></div>

<div id="result"></div>

</div>

<script>

async function generate(){

let key=document.getElementById("jiraKey").value
let result=document.getElementById("result")
let loading=document.getElementById("loading")

loading.innerHTML="Generating test cases..."
result.innerHTML=""

try{

const response=await fetch("https://n8n-public-epns.onrender.com/webhook/Jira-Test-Case-Generator",{
method:"POST",
headers:{
"Content-Type":"application/json",
"x-path-api":"Goutham@12"
},
body:JSON.stringify({
issueKey:key
})
})

const data=await response.json()

loading.innerHTML=""

let html=""

data.positive_tests.forEach(tc=>{

html+=`
<div class="card">

<h3>${tc.test_case_id}</h3>

<b>Preconditions</b>
<p>${tc.preconditions}</p>

<b>Steps</b>
<ul>
${tc.steps.map(step=>`<li>${step}</li>`).join("")}
</ul>

<b>Expected Result</b>
<p>${tc.expected_result}</p>

</div>
`

})

result.innerHTML=html

}catch(err){

loading.innerHTML=""
result.innerHTML="Error: "+err.message

}

}

</script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Jira Test Case Generator</title>

<style>
body{
font-family: Arial;
background:#f4f6f8;
margin:0;
padding:0;
}

.container{
max-width:900px;
margin:60px auto;
background:white;
padding:40px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h1{
text-align:center;
color:#1f2937;
}

.input-box{
display:flex;
gap:10px;
margin-top:20px;
}

input{
flex:1;
padding:12px;
font-size:16px;
border:1px solid #ddd;
border-radius:8px;
}

button{
background:#2563eb;
color:white;
border:none;
padding:12px 20px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#1d4ed8;
}

.loader{
display:none;
text-align:center;
margin-top:20px;
}

.testcases{
margin-top:30px;
}

.card{
background:#f9fafb;
padding:15px;
border-radius:8px;
margin-bottom:15px;
border-left:4px solid #2563eb;
}

.steps{
margin-top:10px;
padding-left:20px;
}

.error{
color:red;
margin-top:20px;
font-weight:bold;
}
</style>

</head>

<body>

<div class="container">

<h1>AI Jira Test Case Generator</h1>

<div class="input-box">
<input id="issueKey" placeholder="Enter Jira Issue Key (e.g QA-1)">
<button onclick="generate()">Generate</button>
</div>

<div class="loader" id="loader">
Generating test cases...
</div>

<div class="error" id="error"></div>

<div class="testcases" id="results"></div>

</div>

<script>

async function generate(){

const issueKey=document.getElementById("issueKey").value;

document.getElementById("loader").style.display="block";
document.getElementById("results").innerHTML="";
document.getElementById("error").innerText="";

try{

const response=await fetch(
"https://n8n-public-epns.onrender.com/webhook/Jira-Test-Case-Generator",
{
method:"POST",
headers:{
"Content-Type":"application/json",
"x-path-api":"Goutham@12"
},
body:JSON.stringify({
issueKey:issueKey
})
});

const data=await response.json();

if(data.error){

document.getElementById("error").innerText=data.message;
document.getElementById("loader").style.display="none";
return;

}

renderResults(data);

}catch(err){

document.getElementById("error").innerText="Server error";
}

document.getElementById("loader").style.display="none";

}

function renderResults(data){

const container=document.getElementById("results");

container.innerHTML+=`<h2>Issue: ${data.issue_key}</h2>`;

container.innerHTML+=`<h3>Positive Tests</h3>`;
data.positive_tests.forEach(t=>{
container.innerHTML+=card(t);
});

container.innerHTML+=`<h3>Negative Tests</h3>`;
data.negative_tests.forEach(t=>{
container.innerHTML+=card(t);
});

}

function card(test){

let stepsHTML="";
test.steps.forEach(s=>{
stepsHTML+=`<li>${s}</li>`;
});

return `
<div class="card">
<strong>${test.test_case_id}</strong>

<p><b>Preconditions:</b> ${test.preconditions}</p>

<b>Steps</b>
<ul class="steps">
${stepsHTML}
</ul>

<p><b>Expected Result:</b> ${test.expected_result}</p>
</div>
`;

}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>AI Jira Test Case Generator</title>

<style>

body{
font-family: Arial, sans-serif;
background:#0f172a;
display:flex;
justify-content:center;
align-items:flex-start;
min-height:100vh;
margin:0;
padding-top:40px;
color:white;
}

.container{
background:#1e293b;
padding:30px;
border-radius:12px;
width:700px;
max-width:90%;
box-shadow:0 8px 25px rgba(0,0,0,0.4);
}

h1{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
border-radius:6px;
border:none;
margin-bottom:15px;
font-size:16px;
}

button{
width:100%;
padding:12px;
background:#38bdf8;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
font-size:16px;
}

button:hover{
background:#0ea5e9;
}

#loading{
margin-top:15px;
text-align:center;
font-style:italic;
}

.section{
margin-top:30px;
}

.testcase{
background:#0f172a;
padding:15px;
margin-top:15px;
border-radius:8px;
border-left:4px solid #38bdf8;
}

.testcase ul{
margin-top:5px;
}

</style>
</head>

<body>

<div class="container">

<h1>AI Jira Test Case Generator</h1>

<input id="jiraKey" placeholder="Enter Jira Issue Key (Example: QA-1)" />

<button onclick="generate()">Generate Test Cases</button>

<div id="loading"></div>

<div id="result"></div>

</div>

<script>

async function generate(){

const key=document.getElementById("jiraKey").value
const result=document.getElementById("result")
const loading=document.getElementById("loading")

result.innerHTML=""
loading.innerHTML="Generating test cases..."

try{

const response=await fetch(
"https://n8n-public-epns.onrender.com/webhook/Jira-Test-Case-Generator",
{
method:"POST",
headers:{
"Content-Type":"application/json",
"x-path-api":"Goutham@12"
},
body:JSON.stringify({
issueKey:key
})
}
)

const data=await response.json()

loading.innerHTML=""

let html=""

html+=`<div class="section">
<h2>Positive Test Cases</h2>
`

data.positive_tests.forEach(tc=>{

html+=`
<div class="testcase">

<b>${tc.test_case_id}</b><br><br>

<b>Preconditions</b><br>
${tc.preconditions}<br><br>

<b>Steps</b>
<ul>
${tc.steps.map(s=>`<li>${s}</li>`).join("")}
</ul>

<b>Expected Result</b><br>
${tc.expected_result}

</div>
`
})

html+=`</div>`

html+=`<div class="section">
<h2>Negative Test Cases</h2>
`

data.negative_tests.forEach(tc=>{

html+=`
<div class="testcase">

<b>${tc.test_case_id}</b><br><br>

<b>Preconditions</b><br>
${tc.preconditions}<br><br>

<b>Steps</b>
<ul>
${tc.steps.map(s=>`<li>${s}</li>`).join("")}
</ul>

<b>Expected Result</b><br>
${tc.expected_result}

</div>
`
})

html+=`</div>`

result.innerHTML=html

}catch(err){

loading.innerHTML=""
result.innerHTML="<p style='color:red'>Error: "+err.message+"</p>"

}

}

</script>

</body>
</html>
